<!--
  AI Tools Directory — Newsletter Email Template
  
  USE: Copy this into Beehiiv's custom HTML editor for consistent branding.
  Replace {{CONTENT}} with the issue content.
  
  Brand: Clash Display / General Sans, Teal (#0ff0e0) + Amber (#f5a623), Dark (#09090b)
  
  NOTE: Email clients are limited — this uses inline styles and table layout
  for maximum compatibility.
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Marketing Stack</title>
</head>
<body style="margin:0; padding:0; background-color:#09090b; font-family:Arial, Helvetica, sans-serif;">

<!-- Wrapper -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#09090b;">
<tr><td align="center" style="padding: 32px 16px;">

<!-- Container -->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%;">

  <!-- Header -->
  <tr>
    <td style="padding: 24px 32px; border-bottom: 1px solid #27272a;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td style="font-size:20px; font-weight:700; color:#fafafa; letter-spacing:-0.02em;">
            The AI Marketing Stack
          </td>
          <td align="right" style="font-size:12px; color:#71717a;">
            by Dallas
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Gradient accent bar -->
  <tr>
    <td style="height:2px; background-color:#0ff0e0; background: -webkit-linear-gradient(left, #0ff0e0, #f5a623, #ff6b6b); background: linear-gradient(90deg, #0ff0e0, #f5a623, #ff6b6b);"></td>
  </tr>

  <!-- Body Content -->
  <tr>
    <td style="padding: 40px 32px; color: #a1a1aa; font-size: 15px; line-height: 1.7;">
      
      {{CONTENT}}
      
      <!-- Replace {{CONTENT}} with your issue content. Use these styles: -->
      
      <!--
        Headers: <h2 style="color:#fafafa; font-size:20px; font-weight:700; margin:32px 0 12px 0; letter-spacing:-0.01em;">
        
        Subheaders: <h3 style="color:#fafafa; font-size:16px; font-weight:600; margin:24px 0 8px 0;">
        
        Body text: <p style="color:#a1a1aa; font-size:15px; line-height:1.7; margin:0 0 16px 0;">
        
        Links: <a href="URL" style="color:#0ff0e0; text-decoration:none; font-weight:500;">
        
        Tool name callout: <strong style="color:#fafafa;">Tool Name</strong> — <em style="color:#71717a;">description</em>
        
        Rating: <span style="color:#f5a623; font-size:13px;">⭐ 4.7/5</span>
        
        CTA button:
        <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0;">
          <tr>
            <td style="background:#0ff0e0; border-radius:10px; padding:12px 28px;">
              <a href="URL" style="color:#09090b; font-size:14px; font-weight:700; text-decoration:none; letter-spacing:0.02em;">
                Button Text →
              </a>
            </td>
          </tr>
        </table>
        
        Divider:
        <hr style="border:none; border-top:1px solid #27272a; margin:32px 0;">
        
        Section badge:
        <span style="display:inline-block; background:rgba(15,240,224,0.12); color:#0ff0e0; font-size:11px; font-weight:600; padding:4px 12px; border-radius:12px; letter-spacing:0.04em; text-transform:uppercase; margin-bottom:12px;">
          SECTION NAME
        </span>
      -->

    </td>
  </tr>

  <!-- Footer -->
  <tr>
    <td style="padding: 24px 32px; border-top: 1px solid #27272a;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td style="font-size:12px; color:#a1a1aa; line-height:1.6;">
            <a href="https://aitoolsdirectory.com" style="color:#71717a; text-decoration:none;">AI Tools Directory</a> · 
            <a href="https://dallasc.gumroad.com" style="color:#71717a; text-decoration:none;">Templates</a>
            <br>
            You're getting this because you signed up for The AI Marketing Stack.
            <br>
            <a href="{{unsubscribe_url}}" style="color:#a1a1aa; text-decoration:underline;">Unsubscribe</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>

</table>
<!-- /Container -->

</td></tr>
</table>
<!-- /Wrapper -->

</body>
</html>
